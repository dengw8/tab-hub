<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Hub</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="popup-kicker">Tab Hub</div>
      <div class="status-dot" id="statusDot" title="Ready"></div>
    </header>

    <section class="feature-card">
      <div class="feature-row">
        <div>
          <div class="feature-title">Tab Stash</div>
          <div class="feature-subtitle">Temporary folders for links.</div>
        </div>
        <label class="switch" title="Toggle Tab Stash">
          <input type="checkbox" id="tabTreeToggle">
          <span></span>
        </label>
      </div>
      <button class="primary-action" type="button" id="openTabTreeButton">Open Tab Stash</button>
    </section>

    <section class="feature-card">
      <div class="feature-title">Appearance</div>
      <div class="feature-subtitle">Match the system or choose a fixed theme.</div>
      <div class="segmented-control" aria-label="Theme">
        <button class="segment active" type="button" data-theme-choice="system">System</button>
        <button class="segment" type="button" data-theme-choice="light">Light</button>
        <button class="segment" type="button" data-theme-choice="dark">Dark</button>
      </div>
    </section>

    <section class="feature-card">
      <div class="feature-title">Data transfer</div>
      <div class="feature-subtitle">Move Tab Hub data between browsers with a JSON backup.</div>
      <div class="transfer-actions">
        <button class="secondary-action" type="button" id="exportDataButton">Export data</button>
        <button class="secondary-action" type="button" data-import-mode="merge">Import merge</button>
        <button class="secondary-action danger" type="button" data-import-mode="replace">Replace data</button>
      </div>
      <input type="file" id="importFileInput" accept="application/json,.json" hidden>
    </section>

    <div class="popup-message" id="popupMessage" style="display:none"></div>
    <div class="popup-error" id="popupError" style="display:none"></div>
  </main>

  <script src="popup.js"></script>
</body>

</html>
