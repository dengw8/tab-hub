<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Hub</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="popup-kicker">Tab Hub</div>
      <div class="header-actions">
        <button class="icon-action" type="button" id="openSettingsButton" aria-label="Settings" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
            stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 0 0-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 0 0-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 0 0-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 0 0-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 0 0 1.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.607 2.296.07 2.572-1.065Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
        </button>
        <div class="status-dot" id="statusDot" title="Ready"></div>
      </div>
    </header>

    <section class="feature-card">
      <div class="feature-row">
        <div>
          <div class="feature-title">Tab Stash</div>
          <div class="feature-subtitle">Temporary folders for links.</div>
        </div>
        <label class="switch" title="Toggle Tab Stash">
          <input type="checkbox" id="tabTreeToggle">
          <span></span>
        </label>
      </div>
      <button class="primary-action" type="button" id="openTabTreeButton">Open Tab Stash</button>
    </section>

    <section class="feature-card">
      <div class="feature-row">
        <div>
          <div class="feature-title">Tab Atlas</div>
          <div class="feature-subtitle">Knowledge map for source tabs.</div>
        </div>
        <label class="switch" title="Toggle Tab Atlas">
          <input type="checkbox" id="tabAtlasToggle">
          <span></span>
        </label>
      </div>
      <button class="primary-action" type="button" id="openTabAtlasButton">Open Tab Atlas</button>
    </section>

    <div class="popup-message" id="popupMessage" style="display:none"></div>
    <div class="popup-error" id="popupError" style="display:none"></div>
  </main>

  <script src="popup.js"></script>
</body>

</html>
